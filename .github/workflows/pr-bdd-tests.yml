name: BDD Tests

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
    workflow_dispatch:

jobs:
    generate-matrix:
        runs-on: ubuntu-latest
        outputs:
            matrix: ${{ steps.set-matrix.outputs.matrix }}
        steps:
            - uses: actions/checkout@v4
            - id: set-matrix
              run: |
                  python3 - <<'PY'
                  import glob
                  import json
                  import os
                  import re

                  services = []
                  for file in glob.glob('bdd-configs/*-framework.yml'):
                      with open(file, 'r', encoding='utf-8') as f:
                          content = f.read()

                      def extract(field):
                          pattern = r'^\s*' + re.escape(field) + r'\s*:\s*(?:"([^"]+)"|\'([^\']+)\'|([^\s\n]+))'
                          match = re.search(pattern, content, re.MULTILINE)
                          if match:
                              return match.group(1) or match.group(2) or match.group(3)
                          return None

                      repo = extract('repo')
                      service = extract('service')
                      if repo and service:
                          build_go = str(extract('build_go') or '').lower() == 'true'
                          binary_repo = extract('binary_repo') or ''
                          services.append({
                              'repo': repo,
                              'service': service,
                              'config': os.path.basename(file),
                              'profile': extract('docker_profile') or '',
                              'build_go': build_go,
                              'service_package': '' if build_go else repo,
                              'binary_repo': binary_repo
                          })

                  matrix_json = json.dumps({'include': services})
                  print(f"Generated matrix: {matrix_json}")
                  with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as out:
                      out.write(f"matrix={matrix_json}\n")
                  PY

    bdd-tests:
        needs: generate-matrix
        if: ${{ fromJson(needs.generate-matrix.outputs.matrix).include[0] != null }}
        name: Test ${{ matrix.service }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
        services:
            kafka:
                image: quay.io/ccxdev/kafka-no-zk:latest
                ports:
                    - 9092:9092
                env:
                    KAFKA_ADVERTISED_HOST_NAME: localhost
                options: >-
                    --health-cmd "kafka-topics.sh --bootstrap-server localhost:9092 --list"
                    --health-interval 10s
                    --health-timeout 10s
                    --health-retries 10

            database:
                image: postgres:13.9
                ports:
                    - 5432:5432
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: test

            minio:
                image: quay.io/ccxdev/minio-server-ubi:latest
                ports:
                    - 9000:9000
                env:
                    MINIO_ACCESS_KEY: test_access_key
                    MINIO_SECRET_KEY: test_secret_access_key
                    PORT: 9000

            pushgateway:
                image: quay.io/ccxdev/prom-pushgateway-admin:latest
                ports:
                    - 9091:9091

            mock-oauth2-server:
                image: ghcr.io/navikt/mock-oauth2-server:2.2.1
                ports:
                    - 8081:8081
                env:
                    PORT: 8081

        steps:
            - name: Checkout behavioral spec repository
              uses: actions/checkout@v4
              with:
                  path: insights-behavioral-spec

            - name: Checkout service repository
              uses: actions/checkout@v4
              with:
                  repository: RedHatInsights/${{ matrix.repo }}
                  path: ${{ matrix.repo }}

            - name: Checkout binary repository
              if: matrix.binary_repo != ''
              uses: actions/checkout@v4
              with:
                  repository: RedHatInsights/${{ matrix.binary_repo }}
                  path: ${{ matrix.binary_repo }}

            - name: Install kcat
              run: |
                  sudo apt-get update -q
                  sudo apt-get install -y kafkacat

            - name: Add hosts entries
              run: |
                  echo "127.0.0.1 pushgateway" | sudo tee -a /etc/hosts
                  echo "127.0.0.1 mock-oauth2-server" | sudo tee -a /etc/hosts

            - name: Set up Go
              if: matrix.build_go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.25"

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Install Python dependencies
              working-directory: insights-behavioral-spec
              run: pip install -r requirements.txt

            - name: Build service binary
              run: |
                  build_dir="${{ matrix.binary_repo != '' && matrix.binary_repo || matrix.repo }}"
                  if [ -f "$build_dir/build.sh" ]; then
                    echo "Found build.sh in $build_dir, running it"
                    (cd "$build_dir" && ./build.sh)
                  elif [ -f "$build_dir/Makefile" ] && grep -q "^build:" "$build_dir/Makefile"; then
                    echo "Found Makefile with build target in $build_dir, running make build"
                    (cd "$build_dir" && make build)
                  else
                    echo "No build step found in $build_dir, skipping"
                  fi

            - name: Link service binary into spec directory
              if: matrix.build_go
              run: |
                  build_dir="${{ matrix.binary_repo != '' && matrix.binary_repo || matrix.repo }}"
                  find "${{ github.workspace }}/$build_dir" -maxdepth 1 -type f -executable | while read -r bin; do
                      ln -sf "$bin" "${{ github.workspace }}/insights-behavioral-spec/$(basename "$bin")"
                      echo "Linked $(basename "$bin") into spec dir"
                  done
                  echo "${{ github.workspace }}/insights-behavioral-spec" >> $GITHUB_PATH

            - name: Create local symlink for BDD config paths
              working-directory: insights-behavioral-spec/bdd-configs
              run: |
                  rm -f insights-behavioral-spec || true
                  ln -s .. insights-behavioral-spec
                  rm -f config || true
                  ln -s ../config config
                  rm -f test_data || true
                  ln -s ../test_data test_data

            - name: Resolve local binary paths from BDD config
              run: |
                  python3 .github/scripts/resolve_bdd_env_paths.py \
                    "${{ github.workspace }}/insights-behavioral-spec/bdd-configs/${{ matrix.config }}"
              working-directory: ${{ github.workspace }}/insights-behavioral-spec

            - name: Free ports declared in BDD config
              run: |
                  python3 .github/scripts/free_bdd_ports.py \
                    "${{ github.workspace }}/insights-behavioral-spec/bdd-configs/${{ matrix.config }}"
              working-directory: ${{ github.workspace }}/insights-behavioral-spec

            - name: Run BDD Framework
              uses: LukenLarra/RedHat-BDD-Framework/actions/main@main
              with:
                  service: ${{ matrix.service }}
                  bdd_config: "${{ github.workspace }}/insights-behavioral-spec/bdd-configs/${{ matrix.config }}"
                  test_requirements: "insights-behavioral-spec/requirements.txt"
                  service_package: ${{ matrix.service_package != '' && format('{0}/{1}', github.workspace, matrix.service_package) || '' }}

            - name: Upload test reports
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: bdd-test-reports-${{ matrix.service }}
                  path: reports/junit/*.xml
                  retention-days: 5

    publish_report:
        name: Publish Test Results
        needs: bdd-tests
        runs-on: ubuntu-latest
        if: ${{ always() }}
        permissions:
            contents: read
            checks: write
            pull-requests: write
        steps:
            - name: Download partial reports
              uses: actions/download-artifact@v4
              with:
                  pattern: bdd-test-reports-*
                  path: reports/junit
                  merge-multiple: true

            - name: Publish merged test results
              uses: LukenLarra/RedHat-BDD-Framework/actions/publish-reports@main
              with:
                  report_path: "reports/junit/*.xml"
