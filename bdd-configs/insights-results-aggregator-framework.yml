project:
    name: "insights-results-aggregator"
    version: "1.0.0"

tests:
    enabled: true
    path: "."
    command: "python -m behave @insights-behavioral-spec/test_list/insights_results_aggregator.txt --junit --junit-directory reports/junit --format pretty"
    bdd:
        features: "insights-behavioral-spec/features/insights-results-aggregator"
        steps: "insights-behavioral-spec/features/steps"
        environment: "insights-behavioral-spec/features/environment.py"
    env:
        INSIGHTS_RESULTS_AGGREGATOR_CONFIG_FILE: "insights-behavioral-spec/config/insights_results_aggregator_docker_env.toml"
        INSIGHTS_RESULTS_AGGREGATOR__OCP_RECOMMENDATIONS_STORAGE__PG_USERNAME: "postgres"
        INSIGHTS_RESULTS_AGGREGATOR__OCP_RECOMMENDATIONS_STORAGE__PG_PASSWORD: "postgres"
        INSIGHTS_RESULTS_AGGREGATOR__OCP_RECOMMENDATIONS_STORAGE__PG_HOST: "localhost"
        INSIGHTS_RESULTS_AGGREGATOR__OCP_RECOMMENDATIONS_STORAGE__PG_PORT: "5432"
        INSIGHTS_RESULTS_AGGREGATOR__OCP_RECOMMENDATIONS_STORAGE__PG_DB_NAME: "aggregator"
        INSIGHTS_RESULTS_AGGREGATOR__OCP_RECOMMENDATIONS_STORAGE__TYPE: "sql"
        INSIGHTS_RESULTS_AGGREGATOR__STORAGE_BACKEND__USE: "ocp_recommendations"
        PATH_TO_LOCAL_AGGREGATOR: "insights-behavioral-spec/insights-results-aggregator"
